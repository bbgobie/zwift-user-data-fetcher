name: npm audit

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Run npm audit
        run: |
          npm audit --audit-level=high || (echo "Vulnerabilities found" && exit 1)
